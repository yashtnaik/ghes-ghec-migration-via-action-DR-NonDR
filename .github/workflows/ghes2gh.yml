name: ghes-to-github-migration (staged)

on:
  workflow_dispatch:
    inputs:
      runner:
        description: >
          Runner selector. Use ubuntu-latest for GitHub-hosted.
          For self-hosted, provide JSON array of runner LABELS, e.g. ["self-hosted","linux","x64","ghes-migration"].
        required: true
        default: "ubuntu-latest"

      csv_path:
        description: "Path to repos.csv (repo root or scripts/)"
        required: true
        default: "repos.csv"
        type: string

      max_concurrent:
        description: "Maximum concurrent migrations (1-5)"
        required: false
        default: "5"
        type: choice
        options: ["1","2","3","4","5"]

      approver:
        description: "Approver GitHub handle(s) for manual approval (comma-separated). Example: naik123"
        required: true
        type: string

      # Stage toggles (like your earlier requirement)
      run_pre_validation:
        description: "Run Stage 1: pre-migration validation"
        required: true
        default: "true"
        type: choice
        options: ["true","false"]

      require_approval:
        description: "Require approval between Stage 1 and Stage 2"
        required: true
        default: "true"
        type: choice
        options: ["true","false"]

      run_migration:
        description: "Run Stage 2: migration"
        required: true
        default: "true"
        type: choice
        options: ["true","false"]

      run_post_validation:
        description: "Run Stage 3: post-migration validation"
        required: true
        default: "true"
        type: choice
        options: ["true","false"]

permissions:
  contents: read
  issues: write     # required for issue-based approval gate
  actions: write    # used by some manual approval implementations

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GH_PAT: ${{ secrets.GH_PAT }}
  GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
  GHES_API_URL: ${{ secrets.GHES_API_URL }}

jobs:
  pre-migration-validation:
    name: Stage 1 - Pre-migration validation
    if: ${{ inputs.run_pre_validation == 'true' }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Install/Update GEI extension
        shell: bash
        run: |
          set -euo pipefail
          gh extension install github/gh-gei || gh extension upgrade github/gh-gei
          gh gei --help >/dev/null

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # Your readiness script expects scripts/repos.csv [1](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
      - name: Prepare CSV for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV copied: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run pre-migration checks
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/1_migration-readiness.sh | tee precheck.log

      - name: Publish stage summary (pre-validation)
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Pre‑Migration Validation Summary"
            echo ""
            echo "**CSV:** \`${{ inputs.csv_path }}\` (copied to \`scripts/repos.csv\`)"
            echo ""
            echo "### Consolidated summary (from script)"
            # The script prints these lines [1](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
            grep -E "Total Repositories Processed:|Repositories with Active Pull Requests:|Repositories with Workflows \\(Running or Queued\\):|Repositories with Open Issues:" precheck.log \
              | sed 's/^/- /' || true
            echo ""
            echo "### Next step"
            if [[ "${{ inputs.require_approval }}" == "true" && "${{ inputs.run_migration }}" == "true" ]]; then
              echo "- ⏸️ Manual approval gate is enabled. Workflow will open an approval issue and wait."
            else
              echo "- ▶️ Approval gate disabled OR migration stage not selected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload precheck artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-precheck-${{ github.run_id }}
          path: |
            precheck.log
            scripts/repos.csv
          if-no-files-found: warn


  approval-gate:
    name: ✅ Manual Approval to Proceed
    runs-on: ubuntu-latest
    needs: [pre-migration-validation]
    timeout-minutes: 1440

    # Run approval gate only when:
    # - migration is selected
    # - approval is required
    # - pre stage is either success OR skipped (if user disabled it)
    if: ${{ always()
            && inputs.run_migration == 'true'
            && inputs.require_approval == 'true'
            && (needs.pre-migration-validation.result == 'success' || needs.pre-migration-validation.result == 'skipped') }}

    steps:
      - name: Context
        shell: bash
        run: |
          echo "Approval is required to proceed to migration."
          echo "Approver(s): ${{ inputs.approver }}"

      # This is the same style of logic as your BBS workflow:
      # creates an issue + polls until approval comment is posted.
      - name: Wait for manual approval (issue-based)
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ inputs.approver }}
          minimum-approvals: 1
          issue-title: "Approve GHES → GitHub migration"
          issue-body: |
            Please review the **Pre-migration Validation Summary** in Stage 1.
            Comment **approved** to proceed, or **deny** to stop.
          exclude-workflow-initiator-as-approver: false
          fail-on-denial: true
          polling-interval-seconds: 30

      - name: Publish approval summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🛂 Manual Approval Gate"
            echo ""
            echo "- **Approver(s):** \`${{ inputs.approver }}\`"
            echo "- If this job succeeded, approval was granted."
          } >> "$GITHUB_STEP_SUMMARY"


  migration:
    name: Stage 2 - Migration (GHES → GitHub)
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    timeout-minutes: 360
    needs: [approval-gate, pre-migration-validation]

    # Allow migration when:
    # - selected
    # - pre stage succeeded OR was skipped
    # - approval stage succeeded OR was skipped (if require_approval=false)
    if: ${{ always()
            && inputs.run_migration == 'true'
            && (needs.pre-migration-validation.result == 'success' || needs.pre-migration-validation.result == 'skipped')
            && (needs.approval-gate.result == 'success' || needs.approval-gate.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh python3
          gh --version
          jq --version
          python3 --version

      - name: Install/Update GEI extension
        shell: bash
        run: |
          set -euo pipefail
          gh extension install github/gh-gei || gh extension upgrade github/gh-gei
          gh gei --help >/dev/null

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      - name: Prepare CSV for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV copied: ${{ inputs.csv_path }} → scripts/repos.csv"

      # Uses your runner which calls gh gei migrate-repo per row [2](https://www.youtube.com/watch?v=LS2lq1vMFws)
      - name: Run migration (parallel)
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/2_migration.sh \
            --max-concurrent "${{ inputs.max_concurrent }}" \
            --csv "scripts/repos.csv" \
            --output repo_migration_output.csv \
            | tee migration.log

      # Publish table + migrated links
      - name: Publish migration summary (with migrated links)
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import csv, os
          from pathlib import Path

          out = Path("repo_migration_output.csv")
          summ = Path(os.environ["GITHUB_STEP_SUMMARY"])

          def w(line=""):
            summ.write_text(summ.read_text(encoding="utf-8") + line + "\n", encoding="utf-8") if summ.exists() else summ.write_text(line + "\n", encoding="utf-8")

          w("## 🚀 Migration Summary (GHES → GitHub)")
          w("")
          w(f"- **Concurrency:** `{os.getenv('MAX_CONCURRENT','') or '${{ inputs.max_concurrent }}'}`")
          w("")

          if not out.exists():
            w("> [!CAUTION]")
            w("> `repo_migration_output.csv` not found. Check `migration.log`.")
            raise SystemExit(0)

          rows = list(csv.DictReader(out.open(encoding="utf-8", newline="")))
          success = sum(1 for r in rows if (r.get("Migration_Status","") or "").lower().startswith("success"))
          failure = sum(1 for r in rows if (r.get("Migration_Status","") or "").lower().startswith("failure"))

          w("### 📊 Totals")
          w(f"- ✅ Success: **{success}**")
          w(f"- ❌ Failure: **{failure}**")
          w("")
          w("### 📌 Per-repo status & migrated links")
          w("| Source (GHES) | Status | Target (GitHub) |")
          w("|---|---|---|")

          for r in rows:
            src = f"{r.get('ghes_org','')}/{r.get('ghes_repo','')}"
            status = r.get("Migration_Status","")
            gh_org = r.get("github_org","")
            gh_repo = r.get("github_repo","")
            if (status or "").lower().startswith("success") and gh_org and gh_repo:
              link = f"https://github.com/{gh_org}/{gh_repo}"
              w(f"| {src} | ✅ Success | {link} |")
            else:
              w(f"| {src} | ❌ {status} | - |")

          w("")
          w("### 📁 Artifacts")
          w("- `repo_migration_output.csv`, `migration.log`, `migration-*.txt`")
          PY

      - name: Upload migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-migration-${{ github.run_id }}
          path: |
            migration.log
            repo_migration_output.csv
            migration-*.txt
          if-no-files-found: warn


  post-migration-validation:
    name: Stage 3 - Post-migration validation
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    timeout-minutes: 180
    needs: [migration, pre-migration-validation]

    # Allow post-validation when:
    # - selected
    # - migration succeeded OR was skipped (if user didn’t run it)
    if: ${{ always()
            && inputs.run_post_validation == 'true'
            && (needs.migration.result == 'success' || needs.migration.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # Validation script expects scripts/repos.csv [3](https://docs.github.com/en/actions/reference/workflows-and-actions/deployments-and-environments)
      - name: Prepare CSV for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV copied: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run post-migration validation
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/3_post_migration_validation.sh | tee post_validation.log

      - name: Publish post-validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Post‑Migration Validation Summary"
            echo ""
            echo "- ❌ ERROR lines: **$(grep -c \"ERROR\" post_validation.log || true)**"
            echo "- ⚠️ ❌ Not Matching lines: **$(grep -c \"❌ Not Matching\" post_validation.log || true)**"
            echo ""
            echo "### 📁 Artifacts"
            echo "- `post_validation.log`, `validation-log-*.txt`, `validation-*.json`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload post-validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-postvalidation-${{ github.run_id }}
          path: |
            post_validation.log
            validation-log-*.txt
            validation-*.json
          if-no-files-found: warn
